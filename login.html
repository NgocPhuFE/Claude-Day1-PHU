<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Sign in</title>

		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

		<script src="https://cdn.tailwindcss.com"></script>
		<script>
			tailwind.config = {
				darkMode: 'class',
				theme: {
					extend: {
						colors: {
							primary: '#DF6B33',
							page: '#090A14'
						},
						fontFamily: {
							poppins: ['Poppins', 'ui-sans-serif', 'system-ui'],
							inter: ['Inter', 'ui-sans-serif', 'system-ui']
						}
					}
				}
			}
		</script>

		<script src="https://unpkg.com/lucide@latest"></script>

		<style>
			:root { color-scheme: dark; }
			html, body { height: 100%; }
			body {
				background-color: #090A14;
				font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
			}
			h1, h2 { font-family: Poppins, Inter, system-ui; }

			@keyframes shake {
				0% { transform: translateX(0); }
				25% { transform: translateX(-4px); }
				50% { transform: translateX(4px); }
				75% { transform: translateX(-2px); }
				100% { transform: translateX(0); }
			}
			.animate-shake { animation: shake 300ms ease; }
		</style>
	</head>
	<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 text-white">
		<main class="w-full max-w-md">
			<div class="bg-[rgba(255,255,255,0.02)] border border-white/10 rounded-2xl shadow-xl overflow-hidden">
				<div class="p-8 sm:p-10">

					<div class="mb-8 text-center">
						<h1 class="text-3xl sm:text-4xl font-extrabold" style="letter-spacing: -0.02em;">Welcome back</h1>
						<p class="mt-2 text-sm text-white/60">Sign in to your account</p>
					</div>

					<form class="space-y-5" action="#" method="POST" novalidate role="form">
						<div>
							<label for="email" class="block text-sm font-medium text-white/80 mb-2">Email</label>
							<div class="relative">
								<input
									id="email"
									name="email"
									type="email"
									autocomplete="email"
									required
									placeholder="you@example.com"
									class="w-full rounded-lg bg-transparent border border-white/20 px-4 py-3 pr-12 placeholder-white/40 text-white transition-colors focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/50"
								/>
								<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-white/50">
									<i data-lucide="mail" class="w-5 h-5"></i>
								</div>
							</div>
							<p id="email-error" class="mt-1.5 text-sm text-red-400 hidden" role="alert" aria-live="assertive"></p>
						</div>

						<div>
							<label for="password" class="block text-sm font-medium text-white/80 mb-2">Password</label>
							<div class="relative">
								<input
									id="password"
									name="password"
									type="password"
									autocomplete="current-password"
									required
									placeholder="Min. 8 characters"
									class="w-full rounded-lg bg-transparent border border-white/20 px-4 py-3 pr-12 placeholder-white/40 text-white transition-colors focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/50"
								/>
								<div class="absolute inset-y-0 right-3 flex items-center">
									<button type="button" aria-label="Toggle password visibility" class="text-white/50 hover:text-white transition-colors cursor-pointer">
										<i data-lucide="eye" class="w-5 h-5"></i>
									</button>
								</div>
							</div>
							<p id="password-error" class="mt-1.5 text-sm text-red-400 hidden" role="alert" aria-live="assertive"></p>
						</div>

						<div class="flex items-center justify-between">
							<label class="inline-flex items-center gap-2 text-sm text-white/70 cursor-pointer select-none">
								<input type="checkbox" name="remember" class="h-4 w-4 rounded border-white/20 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 cursor-pointer" />
								Remember me
							</label>
							<a href="#" class="text-sm text-white/60 hover:text-primary transition-colors">Forgot password?</a>
						</div>

						<button type="submit" class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-primary text-black font-semibold text-base transition-all hover:brightness-110 hover:shadow-lg hover:shadow-primary/25 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#090A14] cursor-pointer">
							Sign in
						</button>
					</form>

					<div role="status" aria-live="polite" class="mt-3 sr-only" id="form-status"></div>

					<div class="mt-8">
						<div class="relative">
							<div class="absolute inset-0 flex items-center">
								<div class="w-full border-t border-white/10"></div>
							</div>
							<div class="relative flex justify-center text-sm">
								<span class="bg-transparent px-4 text-white/50">Or sign in with</span>
							</div>
						</div>

						<div class="mt-5 grid grid-cols-3 gap-3">
							<button type="button" aria-label="Sign in with Google" class="group flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-white text-black font-medium text-sm transition-all hover:-translate-y-0.5 hover:shadow-lg focus:-translate-y-0 active:translate-y-0 cursor-pointer">
								<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="flex-shrink-0">
									<path d="M21.6 12.227c0-.74-.066-1.449-.188-2.14H12v4.053h5.6c-.24 1.304-.96 2.415-2.04 3.165v2.64h3.312C20.88 18.36 21.6 15.6 21.6 12.227z" fill="#4285F4"/>
									<path d="M12 22c2.7 0 4.968-.9 6.624-2.44l-3.312-2.64c-.924.62-2.1.99-3.312.99-2.544 0-4.704-1.716-5.476-4.02H2.064v2.52C3.708 19.92 7.38 22 12 22z" fill="#34A853"/>
									<path d="M6.524 13.89A7.356 7.356 0 0 1 6 12c0-.66.108-1.296.308-1.89V7.59H2.064A11.988 11.988 0 0 0 .6 12c0 1.92.48 3.72 1.464 5.28l4.46-3.39z" fill="#FBBC05"/>
									<path d="M12 6.48c1.47 0 2.8.51 3.848 1.51l2.884-2.884C16.968 3.576 14.7 2.88 12 2.88 7.38 2.88 3.708 5.0 2.064 8.1l4.46 3.39C7.296 8.196 9.456 6.48 12 6.48z" fill="#EA4335"/>
								</svg>
								<span>Google</span>
							</button>

							<button type="button" aria-label="Sign in with GitHub" class="group flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-white text-black font-medium text-sm transition-all hover:-translate-y-0.5 hover:shadow-lg focus:-translate-y-0 active:translate-y-0 cursor-pointer">
								<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" class="flex-shrink-0">
									<path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.02c0 4.43 2.865 8.188 6.839 9.504.5.092.682-.217.682-.483 0-.237-.009-.868-.014-1.703-2.782.605-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.004.071 1.532 1.032 1.532 1.032.892 1.53 2.341 1.088 2.91.833.091-.647.35-1.088.636-1.339-2.22-.253-4.555-1.113-4.555-4.952 0-1.093.39-1.987 1.03-2.687-.103-.253-.447-1.27.098-2.646 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844c.85.004 1.705.115 2.504.338 1.909-1.296 2.747-1.026 2.747-1.026.547 1.376.203 2.393.1 2.646.64.7 1.028 1.594 1.028 2.687 0 3.848-2.339 4.695-4.566 4.943.359.31.678.923.678 1.86 0 1.343-.012 2.427-.012 2.756 0 .269.18.58.688.482C19.138 20.204 22 16.438 22 12.02 22 6.484 17.523 2 12 2z"/>
								</svg>
								<span>GitHub</span>
							</button>

							<button type="button" aria-label="Sign in with Facebook" class="group flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-white text-black font-medium text-sm transition-all hover:-translate-y-0.5 hover:shadow-lg focus:-translate-y-0 active:translate-y-0 cursor-pointer">
								<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="flex-shrink-0">
									<path d="M22 12.073C22 6.49 17.523 2 12 2S2 6.49 2 12.073c0 4.991 3.657 9.128 8.438 9.95v-7.04H8.898v-2.91h1.54V9.413c0-1.516.9-2.36 2.288-2.36.663 0 1.357.118 1.357.118v1.49h-.762c-.75 0-.986.468-.986.948v1.137h1.68l-.269 2.91h-1.411v7.04C18.343 21.201 22 17.064 22 12.073z" fill="#1877F2"/>
								</svg>
								<span>Facebook</span>
							</button>
						</div>
					</div>
				</div>

				<div class="px-8 py-4 border-t border-white/10 bg-white/[0.01] text-center text-sm text-white/50">
					Don't have an account? <a href="register.html" class="text-primary font-medium hover:underline transition-colors">Sign up</a>
				</div>
			</div>
		</main>

		<script>
			if (typeof lucide !== 'undefined') {
				lucide.createIcons();
			}

			document.querySelectorAll('[aria-label="Toggle password visibility"]').forEach(btn => {
				btn.addEventListener('click', () => {
					const input = document.getElementById('password');
					if (!input) return;
					if (input.type === 'password') {
						input.type = 'text';
						btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
					} else {
						input.type = 'password';
						btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
					}
				});
			});

			(function () {
				const form = document.querySelector('form[role="form"]');
				const email = document.getElementById('email');
				const password = document.getElementById('password');
				const emailError = document.getElementById('email-error');
				const passwordError = document.getElementById('password-error');

				function showError(el, msg, input) {
					el.textContent = msg;
					el.classList.remove('hidden');
					if (input) {
						input.classList.add('border-red-500', 'ring-1', 'ring-red-500');
						input.classList.add('animate-shake');
						setTimeout(() => input.classList.remove('animate-shake'), 350);
					}
				}

				function clearError(el, input) {
					el.textContent = '';
					el.classList.add('hidden');
					if (input) {
						input.classList.remove('border-red-500', 'ring-1', 'ring-red-500');
					}
				}

				function validateEmail(value) {
					if (!value) return 'Email is required.';
					const v = value.trim();
					if (!v.includes('@')) return 'Enter a valid email address.';
					if (!v.toLowerCase().endsWith('@gmail.com')) return 'Email must be a Gmail address.';
					return '';
				}

				function validatePassword(value) {
					if (!value) return 'Password is required.';
					if (value.length < 8) return 'Password must be at least 8 characters.';
					return '';
				}

				email.addEventListener('input', () => {
					const msg = validateEmail(email.value);
					if (msg) {
						showError(emailError, msg, email);
						email.setAttribute('aria-invalid', 'true');
					} else {
						clearError(emailError, email);
						email.removeAttribute('aria-invalid');
					}
				});

				password.addEventListener('input', () => {
					const msg = validatePassword(password.value);
					if (msg) {
						showError(passwordError, msg, password);
						password.setAttribute('aria-invalid', 'true');
					} else {
						clearError(passwordError, password);
						password.removeAttribute('aria-invalid');
					}
				});

				form.addEventListener('submit', (e) => {
					let stop = false;
					const emailMsg = validateEmail(email.value);
					const passMsg = validatePassword(password.value);
					if (emailMsg) {
						showError(emailError, emailMsg, email);
						email.setAttribute('aria-invalid', 'true');
						stop = true;
					} else {
						clearError(emailError, email);
						email.removeAttribute('aria-invalid');
					}
					if (passMsg) {
						showError(passwordError, passMsg, password);
						password.setAttribute('aria-invalid', 'true');
						if (!stop) password.focus();
						stop = true;
					} else {
						clearError(passwordError, password);
						password.removeAttribute('aria-invalid');
					}

					if (stop) {
						e.preventDefault();
						const firstInvalid = form.querySelector('[aria-invalid="true"]');
						if (firstInvalid) firstInvalid.focus();
					}
				});
			})();
		</script>
	</body>
</html>
