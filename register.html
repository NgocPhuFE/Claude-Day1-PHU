<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Create account</title>

		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

		<script src="https://cdn.tailwindcss.com"></script>
		<script>
			tailwind.config = {
				darkMode: 'class',
				theme: {
					extend: {
						colors: {
							primary: '#DF6B33',
							page: '#090A14'
						},
						fontFamily: {
							poppins: ['Poppins', 'ui-sans-serif', 'system-ui'],
							inter: ['Inter', 'ui-sans-serif', 'system-ui']
						}
					}
				}
			}
		</script>

		<script src="https://unpkg.com/lucide@latest"></script>

		<style>
			:root { color-scheme: dark; }
			html, body { height: 100%; }
			body {
				background-color: #090A14;
				font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
			}
			h1, h2 { font-family: Poppins, Inter, system-ui; }

			@keyframes shake {
				0% { transform: translateX(0); }
				25% { transform: translateX(-4px); }
				50% { transform: translateX(4px); }
				75% { transform: translateX(-2px); }
				100% { transform: translateX(0); }
			}
			.animate-shake { animation: shake 300ms ease; }
		</style>
	</head>
	<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 text-white">
		<main class="w-full max-w-md">
			<div class="bg-[rgba(255,255,255,0.02)] border border-white/10 rounded-2xl shadow-xl overflow-hidden">
				<div class="p-8 sm:p-10">

					<div class="mb-8 text-center">
						<h1 class="text-3xl sm:text-4xl font-extrabold" style="letter-spacing: -0.02em;">Create account</h1>
						<p class="mt-2 text-sm text-white/60">Join us today</p>
					</div>

					<form class="space-y-4" action="#" method="POST" novalidate role="form">

						<div>
							<label for="name" class="block text-sm font-medium text-white/80 mb-2">Full name <span class="text-red-400">*</span></label>
							<div class="relative">
								<input
									id="name"
									name="name"
									type="text"
									autocomplete="name"
									required
									placeholder="John Doe"
									class="w-full rounded-lg bg-transparent border border-white/20 px-4 py-3 pr-12 placeholder-white/40 text-white transition-colors focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/50"
								/>
								<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-white/50">
									<i data-lucide="user" class="w-5 h-5"></i>
								</div>
							</div>
							<p id="name-error" class="mt-1.5 text-sm text-red-400 hidden" role="alert" aria-live="assertive"></p>
						</div>

						<div>
							<label for="email" class="block text-sm font-medium text-white/80 mb-2">Email <span class="text-red-400">*</span></label>
							<div class="relative">
								<input
									id="email"
									name="email"
									type="email"
									autocomplete="email"
									required
									placeholder="you@example.com"
									class="w-full rounded-lg bg-transparent border border-white/20 px-4 py-3 pr-12 placeholder-white/40 text-white transition-colors focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/50"
								/>
								<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-white/50">
									<i data-lucide="mail" class="w-5 h-5"></i>
								</div>
							</div>
							<p id="email-error" class="mt-1.5 text-sm text-red-400 hidden" role="alert" aria-live="assertive"></p>
						</div>

						<div>
							<label for="phone" class="block text-sm font-medium text-white/80 mb-2">Phone number <span class="text-white/40 font-normal">(optional)</span></label>
							<div class="relative">
								<input
									id="phone"
									name="phone"
									type="tel"
									autocomplete="tel"
									placeholder="0123456789"
									maxlength="10"
									class="w-full rounded-lg bg-transparent border border-white/20 px-4 py-3 pr-12 placeholder-white/40 text-white transition-colors focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/50"
								/>
								<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-white/50">
									<i data-lucide="phone" class="w-5 h-5"></i>
								</div>
							</div>
							<p id="phone-error" class="mt-1.5 text-sm text-red-400 hidden" role="alert" aria-live="assertive"></p>
						</div>

						<div>
							<label class="block text-sm font-medium text-white/80 mb-2">Gender <span class="text-white/40 font-normal">(optional)</span></label>
							<div class="flex gap-4 mt-1">
								<label class="inline-flex items-center gap-2 text-sm text-white/70 cursor-pointer select-none">
									<input type="radio" name="gender" value="male" class="h-4 w-4 border-white/20 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 cursor-pointer" />
									Male
								</label>
								<label class="inline-flex items-center gap-2 text-sm text-white/70 cursor-pointer select-none">
									<input type="radio" name="gender" value="female" class="h-4 w-4 border-white/20 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 cursor-pointer" />
									Female
								</label>
								<label class="inline-flex items-center gap-2 text-sm text-white/70 cursor-pointer select-none">
									<input type="radio" name="gender" value="other" class="h-4 w-4 border-white/20 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 cursor-pointer" />
									Other
								</label>
							</div>
						</div>

						<div>
							<label for="address" class="block text-sm font-medium text-white/80 mb-2">Address <span class="text-white/40 font-normal">(optional)</span></label>
							<div class="relative">
								<input
									id="address"
									name="address"
									type="text"
									autocomplete="street-address"
									placeholder="123 Main St, City"
									class="w-full rounded-lg bg-transparent border border-white/20 px-4 py-3 pr-12 placeholder-white/40 text-white transition-colors focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/50"
								/>
								<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-white/50">
									<i data-lucide="map-pin" class="w-5 h-5"></i>
								</div>
							</div>
						</div>

						<div>
							<label for="password" class="block text-sm font-medium text-white/80 mb-2">Password <span class="text-red-400">*</span></label>
							<div class="relative">
								<input
									id="password"
									name="password"
									type="password"
									autocomplete="new-password"
									required
									placeholder="Min. 8 characters"
									class="w-full rounded-lg bg-transparent border border-white/20 px-4 py-3 pr-12 placeholder-white/40 text-white transition-colors focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/50"
								/>
								<div class="absolute inset-y-0 right-3 flex items-center">
									<button type="button" id="toggle-password" aria-label="Toggle password visibility" class="text-white/50 hover:text-white transition-colors cursor-pointer">
										<i data-lucide="eye" class="w-5 h-5"></i>
									</button>
								</div>
							</div>
							<p id="password-error" class="mt-1.5 text-sm text-red-400 hidden" role="alert" aria-live="assertive"></p>
						</div>

						<div>
							<label for="confirm-password" class="block text-sm font-medium text-white/80 mb-2">Confirm password <span class="text-red-400">*</span></label>
							<div class="relative">
								<input
									id="confirm-password"
									name="confirm-password"
									type="password"
									autocomplete="new-password"
									required
									placeholder="Re-enter your password"
									class="w-full rounded-lg bg-transparent border border-white/20 px-4 py-3 pr-12 placeholder-white/40 text-white transition-colors focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/50"
								/>
								<div class="absolute inset-y-0 right-3 flex items-center">
									<button type="button" id="toggle-confirm-password" aria-label="Toggle confirm password visibility" class="text-white/50 hover:text-white transition-colors cursor-pointer">
										<i data-lucide="eye" class="w-5 h-5"></i>
									</button>
								</div>
							</div>
							<p id="confirm-password-error" class="mt-1.5 text-sm text-red-400 hidden" role="alert" aria-live="assertive"></p>
						</div>

						<div>
							<label class="inline-flex items-start gap-2.5 text-sm text-white/70 cursor-pointer select-none">
								<input type="checkbox" name="terms" id="terms" required class="h-4 w-4 mt-0.5 rounded border-white/20 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 cursor-pointer" />
								<span>I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a></span>
							</label>
							<p id="terms-error" class="mt-1.5 text-sm text-red-400 hidden" role="alert" aria-live="assertive"></p>
						</div>

						<button type="submit" class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-primary text-black font-semibold text-base transition-all hover:brightness-110 hover:shadow-lg hover:shadow-primary/25 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#090A14] cursor-pointer">
							Create account
						</button>
					</form>

					<div role="status" aria-live="polite" class="mt-3 sr-only" id="form-status"></div>
				</div>

				<div class="px-8 py-4 border-t border-white/10 bg-white/[0.01] text-center text-sm text-white/50">
					Already have an account? <a href="login.html" class="text-primary font-medium hover:underline transition-colors">Sign in</a>
				</div>
			</div>
		</main>

		<script>
			if (typeof lucide !== 'undefined') {
				lucide.createIcons();
			}

			function setupPasswordToggle(toggleId, inputId) {
				const btn = document.getElementById(toggleId);
				const input = document.getElementById(inputId);
				if (!btn || !input) return;
				btn.addEventListener('click', () => {
					if (input.type === 'password') {
						input.type = 'text';
						btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
					} else {
						input.type = 'password';
						btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
					}
				});
			}

			setupPasswordToggle('toggle-password', 'password');
			setupPasswordToggle('toggle-confirm-password', 'confirm-password');

			(function () {
				const form = document.querySelector('form[role="form"]');
				const name = document.getElementById('name');
				const email = document.getElementById('email');
				const phone = document.getElementById('phone');
				const password = document.getElementById('password');
				const confirmPassword = document.getElementById('confirm-password');
				const terms = document.getElementById('terms');
				const nameError = document.getElementById('name-error');
				const emailError = document.getElementById('email-error');
				const phoneError = document.getElementById('phone-error');
				const passwordError = document.getElementById('password-error');
				const confirmPasswordError = document.getElementById('confirm-password-error');
				const termsError = document.getElementById('terms-error');

				function showError(el, msg, input) {
					el.textContent = msg;
					el.classList.remove('hidden');
					if (input) {
						input.classList.add('border-red-500', 'ring-1', 'ring-red-500');
						input.classList.add('animate-shake');
						setTimeout(() => input.classList.remove('animate-shake'), 350);
					}
				}

				function clearError(el, input) {
					el.textContent = '';
					el.classList.add('hidden');
					if (input) {
						input.classList.remove('border-red-500', 'ring-1', 'ring-red-500');
					}
				}

				function validateName(value) {
					if (!value.trim()) return 'Full name is required.';
					if (value.trim().length < 2) return 'Name must be at least 2 characters.';
					return '';
				}

				function validateEmail(value) {
					if (!value) return 'Email is required.';
					const v = value.trim();
					if (!v.includes('@')) return 'Enter a valid email address.';
					if (!v.toLowerCase().endsWith('@gmail.com')) return 'Email must be a Gmail address.';
					return '';
				}

				function validatePhone(value) {
					if (!value) return '';
					if (!/^\d{10}$/.test(value.trim())) return 'Phone number must be exactly 10 digits.';
					return '';
				}

				function validatePassword(value) {
					if (!value) return 'Password is required.';
					if (value.length < 8) return 'Password must be at least 8 characters.';
					return '';
				}

				function validateConfirmPassword(value) {
					if (!value) return 'Please confirm your password.';
					if (value !== password.value) return 'Passwords do not match.';
					return '';
				}

				function validateTerms() {
					if (!terms.checked) return 'You must agree to the terms and privacy policy.';
					return '';
				}

				name.addEventListener('input', () => {
					const msg = validateName(name.value);
					if (msg) { showError(nameError, msg, name); name.setAttribute('aria-invalid', 'true'); }
					else { clearError(nameError, name); name.removeAttribute('aria-invalid'); }
				});

				email.addEventListener('input', () => {
					const msg = validateEmail(email.value);
					if (msg) { showError(emailError, msg, email); email.setAttribute('aria-invalid', 'true'); }
					else { clearError(emailError, email); email.removeAttribute('aria-invalid'); }
				});

				phone.addEventListener('input', () => {
					const msg = validatePhone(phone.value);
					if (msg) { showError(phoneError, msg, phone); phone.setAttribute('aria-invalid', 'true'); }
					else { clearError(phoneError, phone); phone.removeAttribute('aria-invalid'); }
				});

				password.addEventListener('input', () => {
					const msg = validatePassword(password.value);
					if (msg) { showError(passwordError, msg, password); password.setAttribute('aria-invalid', 'true'); }
					else { clearError(passwordError, password); password.removeAttribute('aria-invalid'); }
					if (confirmPassword.value && confirmPassword.value !== password.value) {
						showError(confirmPasswordError, 'Passwords do not match.', confirmPassword);
						confirmPassword.setAttribute('aria-invalid', 'true');
					} else {
						clearError(confirmPasswordError, confirmPassword);
						confirmPassword.removeAttribute('aria-invalid');
					}
				});

				confirmPassword.addEventListener('input', () => {
					const msg = validateConfirmPassword(confirmPassword.value);
					if (msg) { showError(confirmPasswordError, msg, confirmPassword); confirmPassword.setAttribute('aria-invalid', 'true'); }
					else { clearError(confirmPasswordError, confirmPassword); confirmPassword.removeAttribute('aria-invalid'); }
				});

				form.addEventListener('submit', (e) => {
					let stop = false;
					const checks = [
						{ val: validateName(name.value), el: nameError, input: name },
						{ val: validateEmail(email.value), el: emailError, input: email },
						{ val: validatePhone(phone.value), el: phoneError, input: phone },
						{ val: validatePassword(password.value), el: passwordError, input: password },
						{ val: validateConfirmPassword(confirmPassword.value), el: confirmPasswordError, input: confirmPassword },
					];

					let firstInvalid = null;

					checks.forEach(({ val, el, input }) => {
						if (val) {
							showError(el, val, input);
							input.setAttribute('aria-invalid', 'true');
							if (!stop) { firstInvalid = input; stop = true; }
						} else {
							clearError(el, input);
							input.removeAttribute('aria-invalid');
						}
					});

					const termsMsg = validateTerms();
					if (termsMsg) {
						showError(termsError, termsMsg, null);
						terms.setAttribute('aria-invalid', 'true');
						if (!stop) { firstInvalid = terms; stop = true; }
					} else {
						clearError(termsError, null);
						terms.removeAttribute('aria-invalid');
					}

					if (stop) {
						e.preventDefault();
						if (firstInvalid && firstInvalid.focus) firstInvalid.focus();
					}
				});
			})();
		</script>
	</body>
</html>
